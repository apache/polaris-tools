# Polaris SQL Engine — local demo properties
# Start the environment first: docker compose up -d
# Then seed data:             ./seed.sh
# Then run the shell:         java -jar ../build/libs/polaris-sql-engine-*-demo.jar demo.properties

polaris.uri=http://localhost:8181/api/catalog
polaris.warehouse=demo
polaris.client.id=demo-client
polaris.client.secret=demo-secret

# MinIO S3 settings — routes from the host JVM to the MinIO container
io-impl=org.apache.iceberg.aws.s3.S3FileIO
s3.endpoint=http://localhost:9000
# Endpoint Polaris uses to reach MinIO inside Docker (Docker-internal hostname)
s3.internal-endpoint=http://minio:9000
s3.path-style-access=true
s3.access-key-id=demoaccesskey
s3.secret-access-key=demosecretkey

cli.max-display-rows=50
