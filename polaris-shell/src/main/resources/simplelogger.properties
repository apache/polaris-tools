# slf4j-simple configuration for the demo fat jar.
# Suppress INFO/WARN/DEBUG chatter from Iceberg, Hadoop, and AWS SDK;
# only show ERROR-level messages so query results are not obscured.
org.slf4j.simpleLogger.defaultLogLevel=error
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
