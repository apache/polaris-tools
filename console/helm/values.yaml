  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule

# Configures the liveness probe for polaris console pods.
livenessProbe:
  # @schema minimum: 0
  # -- Number of seconds after the container has started before liveness probes are initiated. Minimum value is 0.
  # @section -- Probes
  initialDelaySeconds: 5
  # @schema minimum: 1
  # -- How often (in seconds) to perform the probe. Minimum value is 1.
  # @section -- Probes
  periodSeconds: 10
  # @schema minimum: 1
  # -- Minimum consecutive successes for the probe to be considered successful after having failed. Minimum value is 1.
  # @section -- Probes
  successThreshold: 1
  # @schema minimum: 1
  # -- Minimum consecutive failures for the probe to be considered failed after having succeeded. Minimum value is 1.
  # @section -- Probes
  failureThreshold: 3
  # @schema minimum: 1
  # -- Number of seconds after which the probe times out. Minimum value is 1.
  # @section -- Probes
  timeoutSeconds: 10
  # @schema minimum: 1
  # -- Optional duration in seconds the pod needs to terminate gracefully upon probe failure. Minimum value is 1.
  # @section -- Probes
  terminationGracePeriodSeconds: 30

# Configures the readiness probe for polaris console pods.
readinessProbe:
  # @schema minimum: 0
  # -- Number of seconds after the container has started before readiness probes are initiated. Minimum value is 0.
  # @section -- Probes
  initialDelaySeconds: 5
  # @schema minimum: 1
  # -- How often (in seconds) to perform the probe. Minimum value is 1.
  # @section -- Probes
  periodSeconds: 10
  # @schema minimum: 1
  # -- Minimum consecutive successes for the probe to be considered successful after having failed. Minimum value is 1.
  # @section -- Probes
  successThreshold: 1
  # @schema minimum: 1
  # -- Minimum consecutive failures for the probe to be considered failed after having succeeded. Minimum value is 1.
  # @section -- Probes
  failureThreshold: 3
  # @schema minimum: 1
  # -- Number of seconds after which the probe times out. Minimum value is 1.
  # @section -- Probes
  timeoutSeconds: 10

# Runtime configuration for the polaris console pods. These values populate the VITE_* environment
# variables that `generate-config.sh` in the polaris console image consumes at startup to write
# `/opt/app-root/src/config.js`. Empty values are omitted from the rendered ConfigMap so
# the script's built-in defaults remain in effect.
config:
  api:
    # -- Base URL of the Polaris API server (sets VITE_POLARIS_API_URL).
    # @section -- Console Config
    polarisApiUrl: "http://polaris:8181"
    # -- Polaris realm name (sets VITE_POLARIS_REALM).
    # @section -- Console Config
    polarisRealm: "POLARIS"
    # -- Default principal scope (sets VITE_POLARIS_PRINCIPAL_SCOPE).
    # @section -- Console Config
    polarisPrincipalScope: "PRINCIPAL_ROLE:ALL"
    # -- HTTP header used to convey the realm to the Polaris server
    # (sets VITE_POLARIS_REALM_HEADER_NAME).
    # @section -- Console Config
    polarisRealmHeaderName: "Polaris-Realm"
    # -- OAuth token endpoint used for internal authentication
    # (sets VITE_OAUTH_TOKEN_URL).
    # @section -- Console Config
    oauthTokenUrl: "http://polaris:8181/api/catalog/v1/oauth/tokens"
  oidc:
    # -- OIDC issuer URL (sets VITE_OIDC_ISSUER_URL). Leave empty to disable OIDC.
    # @section -- Console Config
    issuerUrl: ""
    # -- OIDC client ID (sets VITE_OIDC_CLIENT_ID).
    # @section -- Console Config
    clientId: ""
    # -- OIDC redirect URI (sets VITE_OIDC_REDIRECT_URI).
    # @section -- Console Config
    redirectUri: ""
    # -- OIDC scopes, space-separated (sets VITE_OIDC_SCOPE).
    # @section -- Console Config
    scope: ""

