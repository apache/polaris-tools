chart:
  version: 1.2.3
  appVersion: 4.5.6

release:
  name: polaris-console-release
  namespace: polaris-ns

templates:
  - configmap.yaml

tests:

  # metadata.name
  - it: should set config map name
    asserts:
      - equal:
          path: metadata.name
          value: polaris-console-release
  - it: should set config map name with override
    set:
      nameOverride: polaris-console-override
    asserts:
      - equal:
          path: metadata.name
          value: polaris-console-release-polaris-console-override
  - it: should set config map name with full override
    set:
      fullnameOverride: polaris-console-override
    asserts:
      - equal:
          path: metadata.name
          value: polaris-console-override

  # metadata.namespace
  - it: should set config map namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: polaris-ns

  # metadata.labels
  - it: should set config map default labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: polaris-console
            app.kubernetes.io/instance: polaris-console-release
            app.kubernetes.io/version: 4.5.6
            app.kubernetes.io/managed-by: Helm
            helm.sh/chart: polaris-console-1.2.3
  - it: should set include podLabels in deployment labels
    set:
      configMapLabels:
        app.kubernetes.io/component: polaris-console
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/component: polaris-console

  - it: should render default api config keys
    asserts:
      - equal:
          path: data.VITE_POLARIS_API_URL
          value: "http://polaris:8181"
      - equal:
          path: data.VITE_POLARIS_REALM
          value: "POLARIS"
      - equal:
          path: data.VITE_POLARIS_PRINCIPAL_SCOPE
          value: "PRINCIPAL_ROLE:ALL"
      - equal:
          path: data.VITE_POLARIS_REALM_HEADER_NAME
          value: "Polaris-Realm"
      - equal:
          path: data.VITE_OAUTH_TOKEN_URL
          value: "http://polaris:8181/api/catalog/v1/oauth/tokens"

  - it: should omit ODIC keys when their values are empty
    asserts:
      - notExists:
          path: data.VITE_OIDC_ISSUER_URL
      - notExists:
          path: data.VITE_OIDC_CLIENT_ID
      - notExists:
          path: data.VITE_OIDC_REDIRECT_URI
      - notExists:
          path: data.VITE_OIDC_SCOPE

  - it: should render OIDC keys when set
    set:
      config:
        oidc:
          issuerUrl: "http://localhost:8080/realms/EXTERNAL"
          clientId: "polaris-console"
          redirectUri: "http://localhost:5173/auth/callback"
          scope: "openid profile email"
    asserts:
      - equal:
        path: data.VITE_OIDC_ISSUER_URL
        value: "http://localhost:8080/realms/EXTERNAL"
      - equal:
        path: data.VITE_OIDC_CLIENT_ID
        value: "polaris-console"
      - equal:
        path: data.VITE_OIDC_REDIRECT_URI
        value: "http://localhost:5173/auth/callback"
      - equal:
        path: data.VITE_OIDC_SCOPE
        value: "openid profile email"

  - it: should omit API keys that are explicitly cleared
    set:
      config:
        api:
          oauthTokenUrl: ""
    asserts:
      - notExists:
          path: data.VITE_OAUTH_TOKEN_URL
      - exists:
          path: data.VITE_POLARIS_REALM
